# Bitcoin Core (regtest) — the wallet/miner/txgen side of the harness.
# btcd peers with this node over P2P and is the node btcdwatch actually reads.
server=1
txindex=1
rpcuser=regtest
rpcpassword=regtest

regtest=1
[regtest]
# Accept P2P from btcd and RPC from the churn container (isolated Docker net).
listen=1
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
# Let sendtoaddress work without fee-estimation history on a fresh chain.
fallbackfee=0.0001
