; btcd mainnet configuration for the btcdwatch.com deployment.
; Install at /etc/btcd/btcd.conf (referenced by deploy/btcd.service).
;
; RPC credentials are NOT set here — generate them once and put them in
; this file on the server only (never in the repo):
;   rpcuser=btcdwatch
;   rpcpass=<openssl rand -hex 32>

; Indexes the explorer requires. Adding these to an already-synced node
; triggers a full index build; syncing from scratch with them enabled is
; usually faster overall.
txindex=1
addrindex=1

; P2P: accept inbound peers (helps the network; optional).
listen=0.0.0.0:8333

; RPC: loopback ONLY. The explorer runs on the same box; this port must
; never be reachable from outside (the firewall should enforce it too).
rpclisten=127.0.0.1:8334

; Paths (owned by the btcd system user; see the runbook).
datadir=/var/lib/btcd/data
logdir=/var/lib/btcd/logs
rpccert=/var/lib/btcd/rpc.cert
rpckey=/var/lib/btcd/rpc.key
